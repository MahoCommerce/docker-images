name: Build All

on:
  schedule:
    - cron: '30 3 * * *'  # Runs at 03:30 UTC every day
  workflow_dispatch:

jobs:
  get-branches:
    runs-on: ubuntu-latest
    outputs:
      branches: ${{ steps.get-branches.outputs.result }}
    steps:
      - name: Get all branches
        id: get-branches
        uses: actions/github-script@v6
        with:
          script: |
            const result = await github.rest.repos.listBranches({
              owner: context.repo.owner,
              repo: context.repo.repo
            });
            return result.data.map(branch => branch.name);
  
  build-branch:
    needs: get-branches
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        branch: ${{ fromJson(needs.get-branches.outputs.branches) }}
      fail-fast: false
    steps:
      - name: Trigger build workflow for ${{ matrix.branch }}
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: 'MahoCommerce',
              repo: 'docker-images',
              workflow_id: 'build.yml',
              ref: '${{ matrix.branch }}'
            });
