name: Build All

on:
  schedule:
    - cron: '30 3 * * *'  # Runs at 03:30 UTC every day
  workflow_dispatch:

jobs:
  get-branches:
    runs-on: ubuntu-latest
    outputs:
      branches: ${{ steps.get-branches.outputs.branches }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        
      - name: Get all branches
        id: get-branches
        run: |
          branches=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/branches" | jq -r '.[].name' | jq -R -s -c 'split("\n")[:-1]')
          echo "branches=$branches" >> $GITHUB_OUTPUT
        
  build-branches:
    needs: get-branches
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        branch: ${{ fromJson(needs.get-branches.outputs.branches) }}
      fail-fast: false
    steps:
      - name: Trigger build workflow for ${{ matrix.branch }}
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          event-type: build-branch
          client-payload: '{"branch": "${{ matrix.branch }}"}'
