name: Build

on:
  schedule:
    - cron: '30 3 * * *'  # Runs at 03:30 UTC every day
  workflow_dispatch:
    inputs:
      tag:
        description: 'Single tag to build (leave empty to build all)'
        required: false
        type: string

jobs:
  load-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set matrix
        id: set
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            # Single tag requested
            matrix=$(jq -c --arg tag "${{ inputs.tag }}" '[.[] | select(.tag == $tag)]' versions.json)
          elif [ "${{ github.event_name }}" = "schedule" ]; then
            # Scheduled: all on Sundays, nightly-only otherwise
            day_of_week=$(date +%u)
            if [ "$day_of_week" = "7" ]; then
              matrix=$(jq -c '.' versions.json)
            else
              matrix=$(jq -c '[.[] | select(.tag == "nightly")]' versions.json)
            fi
          else
            # Manual trigger with no tag: build all
            matrix=$(jq -c '.' versions.json)
          fi
          echo "matrix={\"include\":$matrix}" >> "$GITHUB_OUTPUT"

  docker:
    needs: load-matrix
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.load-matrix.outputs.matrix) }}
      fail-fast: false
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set composer.json
        run: |
          cp "composer_json/${{ matrix.composer_json }}.json" composer.json
          jq --arg v "${{ matrix.maho }}" '.require["mahocommerce/maho"] = $v' composer.json > tmp && mv tmp composer.json

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PAT }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: cloud
          endpoint: "mahocommerce/maho"
          install: true

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          tags: "mahocommerce/maho:${{ matrix.tag }}"
          build-args: |
            PHP_VERSION=${{ matrix.php }}
            DEBIAN_VARIANT=${{ matrix.debian }}
            MYSQL=${{ matrix.mysql }}
            PGSQL=${{ matrix.pgsql }}
            SQLITE=${{ matrix.sqlite }}
          outputs: "type=registry"
